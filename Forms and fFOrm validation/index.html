<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms and Form Validation</title>
    <style>
        body {
            background-color: black;
            color: white;
        }
         small{
            color: red;
            font-size: 12px;
        } 
        #hide{
            display: none;
        }
        
    </style>
</head>
<body>
    <!-- form validation meaning adding features so that the form wnon't submt with no or low information or wrong  informaton basically -->

    <!-- taking inputs -->

    <form >
        <input type="text" placeholder="name" id="name">
        <div id="hide">
            <br>
            <!-- <small hidden>Your name should be grater than two characters</small> -->
            <small >Your name should be grater than two characters</small>
        </div>
        <br><br>
        <input type="email" placeholder="email"><br><br>
        <input type="password" placeholder="password"><br><br>
        <select >
            <option value="male">male</option>
            <option value="female">female</option>
            <option value="others">others</option>
        </select><br><br>
        <textarea name="" id="" placeholder="Tell us about you"></textarea><br><br>
        <input type="submit">
    </form>

    
    
    <script src="script.js"></script>
</body>
</html>
