<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Password Validator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- email password valiator  -->
    <!-- interacive feedback form with error highlight -->
     <!--  for more interactiveness add feature to output what is wrong in the input  -->

  <div  class="container">
    <form autocomplete="on" id="form">

      <h2>Login</h2>

      <!-- Email -->
      <div class="input-group">
        <label>Email</label>
        <input type="text" id="email" placeholder="Enter your email">
        <small class="error" id="emailError">Invalid email</small>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
        <small class="error" id="passwordError">Invalid password</small>
      </div>

      <button type="submit">Submit</button>

    </form>
    <div id="resultMeassage"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
