<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111111;
            overflow: hidden;
        }
    </style>
</head>
<body class="text-white min-h-screen p-10 font-sans">

    <div class="max-w-md mx-auto bg-zinc-900/50 border border-zinc-800 p-8 rounded-xl shadow-2xl mb-16">
        <h2 class="text-2xl font-semibold text-center mb-6">Add User</h2>
        
        <form id="userForm" class="space-y-4">
            <div>
                <label class="block text-sm mb-1 text-zinc-400">Name</label>
                <input type="text" id="name" class="w-full bg-zinc-800 border border-zinc-700 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-zinc-600 transition">
            </div>

            <div>
                <label class="block text-sm mb-1 text-zinc-400">Role</label>
                <input type="text" id="role" class="w-full bg-zinc-800 border border-zinc-700 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-zinc-600 transition">
            </div>

            <div>
                <label class="block text-sm mb-1 text-zinc-400">Bio</label>
                <textarea id="bio" rows="3" class="w-full bg-zinc-800 border border-zinc-700 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-zinc-600 transition resize-none"></textarea>
            </div>

            <div>
                <label class="block text-sm mb-1 text-zinc-400">Photo URL</label>
                <input type="text" id="photo" class="w-full bg-zinc-800 border border-zinc-700 rounded-md py-2 px-3 focus:outline-none focus:ring-2 focus:ring-zinc-600 transition">
            </div>

            <button type="submit" class="w-full bg-zinc-100 hover:bg-white text-black font-medium py-2 rounded-md transition mt-4">
                Submit
            </button>
        </form>
    </div>

    <div id="userGrid" class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl flex flex-col items-center text-center">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400" alt="John" class="w-24 h-24 rounded-full object-cover border-4 border-zinc-700 mb-4">
            <h3 class="text-xl font-bold">John Doe</h3>
            <p class="text-zinc-400 text-sm mb-2">Frontend Developer</p>
            <p class="text-zinc-500 text-sm leading-relaxed">Loves building beautiful UIs and learning new technologies.</p>
        </div> -->

    </div>

    <script src="script.js"></script>

</body>
</html>
