<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>localStorage, sessionStorage and Cookies</title>
    <style>
      /* body {
            background-color: black;
            color: white;
        } */

      :root {
        --bg-light: #ffffff;
        --text-light: #1a1a1a;

        --bg-dark: #1a1a1a;
        --text-dark: #ffffff;
      }

      body.light {
        background-color: var(--bg-light);
        color: var(--text-light);
      }

      body.dark {
        background-color: var(--bg-dark);
        color: var(--text-dark);
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        transition:
          background-color 0.3 ease,
          color 0.3s ease;
      }

      .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      button {
        margin-top: 20px;
        padding: 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background-color: #999;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <!-- save theme prefernce in  localStorage -->

    <div class="Light">
      <div class="container">
        <h1>Theme prefernces</h1>
        <button id="toggleTHeme">Toggle Theme</button>
      </div>
    </div>

    <script src="optimized_script.js"></script>
    <!-- <script src="script.js"></script> -->
  </body>
</html>
