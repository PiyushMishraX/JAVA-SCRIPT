<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16:9 Lazy Loading Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
        }

        /* Container that maintains 16:9 ratio based on viewport width */
        .section-16-9 {
            width: 100%;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 2px solid #333;
        }

        /* Specific Styles */
        .text-section {
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            text-align: center;
        }

        .spacer {
            background-color: #1a1a1a;
            color: #555;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the image fills the 16:9 box without stretching */
            display: block;
            background: #222; /* Placeholder color while loading */
        }

        h1 {
            font-size: clamp(2rem, 8vw, 5rem);
        }
    </style>
</head>
<body>

    <section class="section-16-9 text-section">
        <h1>Lazy Loading</h1>
    </section>

    <div class="section-16-9">
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1920&q=80" 
             alt="Nature Scene" 
             loading="lazy">
    </div>

    <div class="section-16-9 spacer">
        <p>Scroll Down (Spacer Section)</p>
    </div>

    <div class="section-16-9">
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1920&q=80" 
             alt="Nature Scene" 
             loading="lazy">
    </div>

    <div class="section-16-9 spacer">
        <p>Scroll Down (Spacer Section)</p>
    </div>

    <div class="section-16-9">
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1920&q=80" 
             alt="Nature Scene" 
             loading="lazy">
    </div>

</body>
</html>
