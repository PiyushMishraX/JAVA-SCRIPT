<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manual Scroll Fullscreen</title>
    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background-color: #000;
        color: #fff;
        /* overflow-x hidden prevents accidental horizontal shifts */
        overflow-x: hidden;
      }

      /* Full Screen Section Setup */
      section {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      h1 {
        font-size: clamp(2rem, 10vw, 6rem);
        text-transform: uppercase;
      }

      /* Image Styling */
      .image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        background-color: #222; /* Placeholder color */
        opacity: 0;
      }

      .loaded {
        opacity: 1 !important; /* !important ensures it wins if there are other styles */
      }

      /* Spacer Styling */
      .spacer {
        background-color: #0a0a0a;
        border-top: 1px solid #1a1a1a;
      }

      .spacer::after {
        content: "SPACER";
        color: #222;
        font-size: 0.8rem;
        letter-spacing: 10px;
      }
    </style>
  </head>
  <body>
    <section>
      <h1>Lazy Images</h1>
    </section>

    <!-- // data-secretkey -> ye js se access ho jaayega waise hi data-src js se use ho jaayega -->

    <!-- no src so image hidden  -->
    <section class="image-container">
      <img
        data-src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80"
        alt="Screen 1"
      />
    </section>

    <section class="spacer"></section>

    <section class="image-container">
      <img
        data-src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1920&q=80"
        alt="Screen 2"
      />
    </section>

    <section class="spacer"></section>

    <section class="image-container">
      <img
        data-src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80"
        alt="Screen 3"
      />
    </section>

    <script src="script.js"></script>
  </body>
</html>
